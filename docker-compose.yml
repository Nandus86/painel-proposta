services:
  db:
    image: postgres:16-alpine
    container_name: painel-proposta-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: painel_proposta
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 60s

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: painel-proposta-backend
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/painel_proposta
      - DATABASE_URL_SYNC=postgresql+psycopg://postgres:postgres@db:5432/painel_proposta
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: painel-proposta-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=/
      - VITE_BASE_DOMAIN=painelproposta.com

volumes:
  pgdata:
